<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/website-logo.png') }}">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --blue: #1B3FD8;
            --blue-dark: #1530B0;
            --blue-light: #2B52F5;
            --gold: #F5C518;
            --white: #ffffff;
            --gray-bg: #F4F6FB;
            --text-dark: #111;
        }

        body {
            font-family: 'Cairo', sans-serif;
            font-weight: bold;
            background: var(--white);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* ========== NAVBAR ========== */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: #fff;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.07);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo img {
            width: 65px;
            height: 55px;
            object-fit: contain;
        }

        /* Desktop nav links - hidden on mobile */
        .nav-links {
            display: flex;
            align-items: center;
            gap: 32px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 700;
            font-size: 15px;
            transition: color 0.2s;
        }

        .nav-links a:hover { color: var(--blue); }
        .nav-links a.active { color: var(--blue); border-bottom: 2px solid var(--blue); padding-bottom: 2px; }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-register {
            background: var(--blue);
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 25px;
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-register:hover {
            background: var(--blue-dark);
        }

        .dropdown {
            position: relative;
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            background: #fff;
            list-style: none;
            padding: 10px 0;
            margin: 0;
            width: 180px;
            border-radius: 10px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);

            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: 0.3s;
        }

        .dropdown-menu li {
            padding: 8px 16px;
        }

        .dropdown-menu a {
            color: #333;
            font-weight: 600;
            display: block;
        }

        .dropdown-menu a:hover {
            color: var(--blue);
        }

        /* Show on hover */
        .dropdown:hover .dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }


        /* Hamburger */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            background: #f0f0f0;
        }

        .hamburger span {
            width: 22px;
            height: 2.5px;
            background: #444;
            border-radius: 2px;
            display: block;
            transition: all 0.3s;
        }

        /* Mobile Menu */
        .mobile-menu {
            display: none;
            flex-direction: column;
            background: #fff;
            border-bottom: 2px solid #eee;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease, padding 0.3s;
        }

        .mobile-menu.open {
            max-height: 900px;
            overflow-y: auto;
            padding: 8px 0 16px;
        }

        .mobile-menu a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 700;
            font-size: 15px;
            padding: 12px 20px;
            border-bottom: 1px solid #f0f0f0;
            display: block;
            transition: background 0.2s, color 0.2s;
            font-family: 'Cairo', sans-serif;
        }

        .mobile-menu a:last-child {
            border-bottom: none;
        }

        .mobile-menu a:hover,
        .mobile-menu a.active {
            color: var(--blue);
            background: #f4f6fb;
        }




        /* ==========  HERO  ========== */
        .hero {
            display: flex;
            justify-content: center;
            color: var(--blue-dark);
            margin-bottom: 10px;
        }

        /* ==========  LOCATION  ========== */

        .location {
            display: flex;
            justify-content: center;
            width: 100%;
            margin: 0;
            padding: 0;
        }

        .location iframe {
            width: 100%;
            height: 450px;
            border: 0;
            display: block;
        }

        /* ==========  LINKS      ========== */
        .links {
            padding: 80px 80px;
        }

        .row {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 60px;
            gap: 20px;
        }

        .row p {
            color: #1036d8;
            font-size: 48px;
            font-weight: bold;
            line-height: 1.4;
            width: 55%;
        }

        .btn {
            width: 420px;
            height: 90px;
            background: #1022e6;
            border-radius: 22px;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 35px;
            text-decoration: none;
            font-size: 42px;
            font-weight: bold;
        }

        .btn img {

            width: 40px;
            height: 40px;
        }

        /* ========== FOOTER ========== */
        footer {
            background: var(--blue);
            padding: 28px 48px;
            text-align: center;
        }

        .footer-logo {
            margin-bottom: 20px;
        }

        .footer-logo img {
            height: 60px;
            width: auto;
            object-fit: contain;
        }

        .footer-logo-fallback {
            display: inline-block;
            margin-bottom: 6px;
        }

        .footer-logo-fallback svg {
            width: 52px;
            height: 52px;
        }

        .footer-logo-text {
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
        }

        .footer-partners {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 50px;
            flex-wrap: wrap;
        }

        .partner-badge {
            background: rgba(255, 255, 255, 0.12);
            border: 1.5px solid rgba(255, 255, 255, 0.25);
            border-radius: 28px;
            padding: 8px 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
        }

        .badge-icon {
            width: 30px;
            height: 30px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .badge-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .badge-icon-text {
            font-size: 14px;
            color: #fff;
        }

        /* ================= MOBILE RESPONSIVE ================= */

@media (max-width: 768px) {

    /* --- NAVBAR --- */
    nav { padding: 10px 14px; }
 
    .nav-logo img { width: 60px; height: 52px; }
 
    .nav-links { display: none; }
    .nav-dots { display: none; }
 
    .hamburger { display: flex; }
 
    .btn-register { padding: 7px 16px; font-size: 13px; }

    /* HERO */
    .hero {
        padding: 20px 14px;
        text-align: center;
    }

    .hero p {
        font-size: 26px !important;
        line-height: 1.6;
    }

    /* MAP */
    .location iframe {
        height: 280px;
    }

    /* LINKS */
    .links {
        padding: 40px 18px;
    }

    .row {
        flex-direction: column;
        text-align: center;
        gap: 20px;
        margin-bottom: 40px;
    }

    .row p {
        width: 100%;
        font-size: 26px;
        line-height: 1.7;
    }

    .btn {
        width: 100%;
        max-width: 100%;
        height: auto;
        padding: 18px 20px;
        font-size: 28px;
        border-radius: 18px;
        justify-content: center;
        gap: 14px;
    }

    .btn img {
        width: 28px;
        height: 28px;
    }

    /* FOOTER */
    footer {
        padding: 24px 16px;
    }

    .footer-partners {
        flex-direction: column;
        gap: 14px;
    }

    .partner-badge {
        width: 100%;
        justify-content: center;
    }

    .footer-logo img {
        width: 90px;
        height: auto;
    }

    /* IMAGES */
    img {
        max-width: 100%;
        height: auto;
    }
}

  /* ================================================
     TOUR GUIDE STYLES
     ================================================ */
  #avatar {
    position: fixed;
    right: 30px;
    bottom: 30px;
    width: 85px;
    height: 85px;
    opacity: 0.9;
    border-radius: 50%;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 3000;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    border: 4px solid #fff;
    background: #fff;
    object-fit: cover;
    object-position: center;
  }

  #avatar:hover {
    opacity: 1;
    transform: scale(1.1) rotate(5deg);
    box-shadow: 0 15px 35px rgba(27,63,216,0.4);
  }

  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    display: none;
    z-index: 2900;
  }

  .highlight-tour {
    position: relative !important;
    z-index: 2901 !important;
    cursor: default !important;
    box-shadow: 0 0 0 8px rgba(255, 255, 255, 0.4), 0 0 30px rgba(255,255,255,0.6) !important;
    border-radius: 12px !important;

    transition: all 0.3s ease;
  }

  /* Specific style for Navbar links/buttons to make them pop clearly */
  nav .highlight-tour, 
  .nav-links .highlight-tour,
  .nav-logo .highlight-tour {
    background: #fff !important;
    color: var(--blue) !important;
    padding: 6px 12px !important;
    border-radius: 10px !important;
    box-shadow: 0 0 0 10px #fff, 0 10px 30px rgba(0,0,0,0.3) !important;
  }

  #guideBox {
    position: absolute;
    background: #fff;
    padding: 24px;
    border-radius: 20px;
    width: 280px;
    display: none;
    z-index: 2902;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    border: 1px solid rgba(0,0,0,0.05);
    animation: fadeInSlide 0.4s ease-out;
  }

  @keyframes fadeInSlide {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  #guideBox p {
    margin: 0 0 18px;
    font-size: 16px;
    line-height: 1.6;
    font-weight: 600;
    color: #333;
  }

  #guideBox button {
    padding: 10px 24px;
    border: none;
    background: var(--blue);
    color: white;
    border-radius: 12px;
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    font-weight: 700;
    font-size: 14px;
    width: 100%;
    transition: background 0.2s;
  }

  #guideBox button:hover {
    background: var(--blue-dark);
  }

  .highlight-tour {
    animation: tourPulse 1.5s infinite;
  }
  #chatbotBtn {
    position: fixed;
    right: 30px;
    bottom: 130px;
    width: 85px;
    height: 85px;
    opacity: 0.9;
    border-radius: 50%;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 3000;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    border: 4px solid #fff;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    overflow: hidden;
  }

  #chatbotBtn:hover {
    opacity: 1;
    transform: scale(1.1) rotate(5deg);
    box-shadow: 0 15px 35px rgba(27, 63, 216, 0.4);
  }

  #chatbotBtn img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    border-radius: 50%;
  }

  /* Force dropdown visibility during tour */
  .dropdown-menu.tour-visible {
    opacity: 1 !important;
    visibility: visible !important;
    transform: translateY(0) !important;
    display: block !important;
  }

  @keyframes tourPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.02); }
    100% { transform: scale(1); }
  }

  @media (max-width: 768px) {
    #avatar {
        width: 70px;
        height: 70px;
        right: 20px;
        bottom: 20px;
    }
    #guideBox {
        width: 240px;
        padding: 18px;
    }
  }
    </style>
</head>

        <script>
            function toggleMenu() {
                const menu = document.getElementById('mobileMenu');
                const hamburger = document.getElementById('hamburger');
                menu.classList.toggle('open');
                menu.style.display = menu.classList.contains('open') ? 'flex' : 'none';

                // Animate hamburger → X
                const spans = hamburger.querySelectorAll('span');
                if (menu.classList.contains('open')) {
                    spans[0].style.transform = 'translateY(7.5px) rotate(45deg)';
                    spans[1].style.opacity = '0';
                    spans[2].style.transform = 'translateY(-7.5px) rotate(-45deg)';
                } else {
                    spans[0].style.transform = '';
                    spans[1].style.opacity = '1';
                    spans[2].style.transform = '';
                }
            }

            // Close menu when clicking a link
            document.querySelectorAll('.mobile-menu a').forEach(link => {
                link.addEventListener('click', () => {
                    const menu = document.getElementById('mobileMenu');
                    menu.classList.remove('open');
                    menu.style.display = 'none';
                    const spans = document.querySelectorAll('.hamburger span');
                    spans.forEach(s => s.style.transform = s.style.opacity = '');
                    spans[1].style.opacity = '1';
                });
            });
        </script>

        <!-- Tour Guide Script -->
        <script>
            const avatar = document.getElementById("avatar");
            const overlay = document.getElementById("overlay");
            const guideBox = document.getElementById("guideBox");
            const guideText = document.getElementById("guideText");

            const gifAvatar = "{{ url_for('static', filename='images/سامر.gif') }}";
            const staticAvatar = "{{ url_for('static', filename='images/avater photo/samer.jpg') }}";

            const steps = [
            { text: "أهلاً! هذا الأفاتار سيرافقك في جولة سريعة.", element: document.getElementById("avatar") },
            { text: "هذا هو القسم الترحيبي.", element: document.querySelector(".hero") },
            { text: "هنا خريطة موقع كلية التربية النوعية.", element: document.querySelector(".location") },
            { text: "هذا قسم الروابط الذي يمكنك من زيارة الفيسبوك والموقع الرسمي.", element: document.querySelector(".links") },
            { text: "وفي النهاية تجد معلومات الاتصال والشعارات في الفوتر.", element: document.querySelector("footer") }
    ];

            let currentStepIdx = 0;

            /* بدء الشرح */
            if (avatar) {
                avatar.onclick = () => {
                    currentStepIdx = 0;
                    avatar.src = gifAvatar + "?t=" + new Date().getTime();
                    showStep();
                };
            }

            function closeTour() {
                if (overlay) overlay.style.display = "none";
                if (guideBox) guideBox.style.display = "none";
                if (avatar) avatar.src = staticAvatar;
                document.querySelectorAll(".highlight-tour").forEach(el => {
                    el.classList.remove("highlight-tour");
                });
                document.querySelectorAll(".tour-visible").forEach(el => {
                    el.classList.remove("tour-visible");
                });
            }

            /* عرض الخطوة */
            function showStep(){
                while (currentStepIdx < steps.length && (!steps[currentStepIdx] || !steps[currentStepIdx].element)) {
                    currentStepIdx++;
                }

                if (currentStepIdx >= steps.length) {
                    closeTour();
                    return;
                }

                const step = steps[currentStepIdx];

                overlay.style.display = "block";
                guideBox.style.display = "block";

                /* إزالة التحديد القديم */
                document.querySelectorAll(".highlight-tour").forEach(el => {
                    el.classList.remove("highlight-tour");
                });
                document.querySelectorAll(".tour-visible").forEach(el => {
                    el.classList.remove("tour-visible");
                });

                /* إضافة highlight */
                step.element.classList.add("highlight-tour");
                
                // Handle Dropdown visibility if target is inside a dropdown
                const dropdownMenu = step.element.closest(".dropdown-menu");
                if (dropdownMenu) {
                    dropdownMenu.classList.add("tour-visible");
                }

                // Scroll to element
                step.element.scrollIntoView({ behavior: 'smooth', block: 'center' });

                /* مكان العنصر */
                setTimeout(() => {
                    const rect = step.element.getBoundingClientRect();
                    
                    /* مكان صندوق الشرح */
                    let topPos = rect.bottom + window.scrollY + 15;
                    let leftPos = rect.left + window.scrollX;

                    // Adjust if too close to bottom
                    if (topPos + 200 > document.documentElement.scrollHeight) {
                        topPos = rect.top + window.scrollY - 180;
                    }

                    // Adjust if too far right
                    if (leftPos + 250 > window.innerWidth) {
                        leftPos = window.innerWidth - 260;
                    }

                    guideBox.style.top = topPos + "px";
                    guideBox.style.left = leftPos + "px";
                    guideText.innerText = step.text;
                }, 300);
            }

            /* التالي */
            function nextStep(){
                currentStepIdx++;

                /* نهاية الخطوات */
                if(currentStepIdx >= steps.length){
                    closeTour();
                    return;
                }

                showStep();
            }

            // Close on overlay click
            if (overlay) {
                overlay.onclick = closeTour;
            }
        </script>
