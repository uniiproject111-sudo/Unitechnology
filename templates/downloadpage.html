 nav {

      .dropdown {
    position: relative;
}

.dropdown-menu {
    position: absolute;
    top: 100%;
    right: 0;
    background: #fff;
    list-style: none;
    padding: 10px 0;
    margin: 0;
    width: 180px;
    border-radius: 10px;

.dropdown-menu li {
    padding: 8px 16px;
}

.dropdown-menu a {
    color: #333;
    font-weight: 600;
    display: block;
}

.dropdown-menu a:hover {
    color: var(--blue);
}

/* Show on hover */
.dropdown:hover .dropdown-menu {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}
 
  
  /* Hamburger */
  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 6px;
    border-radius: 6px;
    background: #f0f0f0;
  }
  .hamburger span {
    width: 22px;
    height: 2.5px;
    background: #444;
    border-radius: 2px;
    display: block;
    transition: all 0.3s;
  }
 
  /* Mobile Menu */
  .mobile-menu {
    display: none;
    flex-direction: column;
    background: #fff;
    border-bottom: 2px solid #eee;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease, padding 0.3s;
  }

    overflow-y: auto;
    padding: 8px 0 16px;

    font-family: 'Cairo', sans-serif;
  }
  .mobile-menu a:last-child { border-bottom: none; }

    color: var(--blue);
    background: #f4f6fb;
  }

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin-bottom: 24px;
}

.office-logo {
  width: 60px;
  height: 60px;
}

.header-text .sub {
  color: #e63946;
  font-size: 13px;
  font-weight: 700;

}

.header-text .main {
  color: #fff;
  font-size: 26px;
  font-weight: 900;
  margin: 0;
}

/* ── White Card ── */
.office-card {
  width: 1200px;
  background: #fff;
    border: 2.5px solid #1e3eff;
  border-radius: 28px;
  padding: 24px 28px 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  margin: 0 auto;
  position: relative;
  padding-bottom: 50px; /* space for overlapping button */
}

/* ── Icons Row ── */
.icons-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
}

.icons-row img {
  width: 140px;
  height: 100%;
  object-fit: contain;
  border-radius: 12px;
}

/* ── Download Button ── */
.download-btn {
  position: absolute;
  bottom: -20px;

  background: #1B3FD8;
  color: #fff;
  text-decoration: none;
  padding: 12px 60px;
  border-radius: 30px;
  font-size: 18px;
  font-weight: 800;
  font-family: 'Cairo', sans-serif;
  white-space: nowrap;
  display: inline-block;
  transition: background 0.3s, transform 0.3s;
}

.download-btn:hover {
  background: #1030b0;
  transform: translateX(-50%) scale(1.05);
}

  /* ================================================
     TOUR GUIDE STYLES
     ================================================ */
  #avatar {
    position: fixed;
    right: 30px;
    bottom: 30px;
    width: 85px;
    height: 85px;
    opacity: 0.9;
    border-radius: 50%;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 3000;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    border: 4px solid #fff;
    background: #fff;
    object-fit: cover;
    object-position: center;
  }

  #avatar:hover {
    opacity: 1;
    transform: scale(1.1) rotate(5deg);
    box-shadow: 0 15px 35px rgba(27,63,216,0.4);
  }

  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    display: none;
    z-index: 2900;
  }

  .highlight-tour {
    position: relative !important;
    z-index: 2901 !important;
    cursor: default !important;
    box-shadow: 0 0 0 8px rgba(255, 255, 255, 0.4), 0 0 30px rgba(255,255,255,0.6) !important;
    border-radius: 12px !important;

    transition: all 0.3s ease;
  }

  /* Specific style for Navbar links/buttons to make them pop clearly */
  nav .highlight-tour, 
  .nav-links .highlight-tour,
  .nav-logo .highlight-tour {
    background: #fff !important;
    color: var(--blue) !important;
    padding: 6px 12px !important;
    border-radius: 10px !important;
    box-shadow: 0 0 0 10px #fff, 0 10px 30px rgba(0,0,0,0.3) !important;
  }

  #guideBox {
    position: absolute;
    background: #fff;
    padding: 24px;
    border-radius: 20px;
    width: 280px;
    display: none;
    z-index: 2902;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    border: 1px solid rgba(0,0,0,0.05);
    animation: fadeInSlide 0.4s ease-out;
  }
  .download-link {
    text-decoration: none; 
    color: inherit; 
}

  @keyframes fadeInSlide {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  #guideBox p {
    margin: 0 0 18px;
    font-size: 16px;
    line-height: 1.6;
    font-weight: 600;
    color: #333;
  }

    background: var(--blue);
    color: white;
    border-radius: 12px;
    cursor: pointer;
    font-family: 'Cairo', sans-serif;
    font-weight: 700;
    font-size: 14px;
    width: 100%;
    transition: background 0.2s;
  }

  #guideBox button:hover {
    background: var(--blue-dark);
  }

  .highlight-tour {
    animation: tourPulse 1.5s infinite;
  }

  /* Force dropdown visibility during tour */
  .dropdown-menu.tour-visible {
    opacity: 1 !important;

    transform: translateY(0) !important;

  }
  #chatbotBtn {

<!-- Tour Guide Script -->
<script>
    const avatar = document.getElementById("avatar");
    const overlay = document.getElementById("overlay");
    const guideBox = document.getElementById("guideBox");
    const guideText = document.getElementById("guideText");

    const gifAvatar = "{{ url_for('static', filename='images/يوسف.gif') }}";

    const steps = [
      { text: "أهلاً! هذا الأفاتار سيرافقك في جولة سريعة.", element: document.getElementById("avatar") },
      { text: "هذا هو القسم الترحيبي لصفحة مركز التحميل.", element: document.querySelector(".hero") },
      { text: "هذا قسم تحميل الملفات ويعرض معلومات الملف.", element: document.querySelector(".download-section") },
      { text: "هنا يمكنك تحميل حزمة الأوفيس أو حزم البرامج الأخرى.", element: document.querySelector(".office-card") },
      { text: "هذا تذييل الصفحة حيث تجد معلومات الدعم وروابط الجامعة.", element: document.querySelector("footer") }
    ];

    let currentStepIdx = 0;

    /* بدء الشرح */
    if (avatar) {
        avatar.onclick = () => {
            currentStepIdx = 0;
            avatar.src = gifAvatar + "?t=" + new Date().getTime();
            showStep();
        };
    }

    function closeTour() {
        overlay.style.display = "none";
        guideBox.style.display = "none";
        avatar.src = "{{ url_for('static', filename='images/avater photo/youssef.jpg') }}";
        document.querySelectorAll(".highlight-tour").forEach(el => {
            el.classList.remove("highlight-tour");
        });
        document.querySelectorAll(".tour-visible").forEach(el => {
            el.classList.remove("tour-visible");
        });
    }

    /* عرض الخطوة */
    function showStep(){
        while (currentStepIdx < steps.length && (!steps[currentStepIdx] || !steps[currentStepIdx].element)) {
            currentStepIdx++;
        }

        if (currentStepIdx >= steps.length) {
            closeTour();
            return;
        }

        const step = steps[currentStepIdx];

        overlay.style.display = "block";
        guideBox.style.display = "block";

        /* إزالة التحديد القديم */
        document.querySelectorAll(".highlight-tour").forEach(el => {
            el.classList.remove("highlight-tour");
        });
        document.querySelectorAll(".tour-visible").forEach(el => {
            el.classList.remove("tour-visible");
        });

        /* إضافة highlight */
        step.element.classList.add("highlight-tour");
        
        // Handle Dropdown visibility if target is inside a dropdown
        const dropdownMenu = step.element.closest(".dropdown-menu");
        if (dropdownMenu) {
            dropdownMenu.classList.add("tour-visible");
        }

        // Scroll to element
        step.element.scrollIntoView({ behavior: 'smooth', block: 'center' });

        /* مكان العنصر */
        setTimeout(() => {
            const rect = step.element.getBoundingClientRect();
            
            /* مكان صندوق الشرح */
            let topPos = rect.bottom + window.scrollY + 15;
            let leftPos = rect.left + window.scrollX;

            // Adjust if too close to bottom
            if (topPos + 200 > document.documentElement.scrollHeight) {
                topPos = rect.top + window.scrollY - 180;
            }

            // Adjust if too far right
            if (leftPos + 250 > window.innerWidth) {
                leftPos = window.innerWidth - 260;
            }

            guideBox.style.top = topPos + "px";
            guideBox.style.left = leftPos + "px";
            guideText.innerText = step.text;
        }, 300);
    }

    /* التالي */
    function nextStep(){
        currentStepIdx++;

        /* نهاية الخطوات */
        if(currentStepIdx >= steps.length){
            closeTour();
            return;
        }

        showStep();
    }

    // Close on overlay click
    if (overlay) {
        overlay.onclick = closeTour;
    }
</script>
